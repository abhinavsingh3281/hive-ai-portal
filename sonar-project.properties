# SonarCloud project config
# Docs: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/github-actions-for-sonarcloud/

sonar.projectKey=abhinavsingh3281_hive-ai-portal
sonar.organization=abhinavsingh3281
sonar.projectName=hive-ai-portal
sonar.projectVersion=0.1.0

# Source paths
sonar.sources=server/src,ui/src,packages

# Exclude generated, build, and test files from analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/drizzle/**,\
  **/.aisc/**

# TypeScript config
sonar.typescript.tsconfigPath=tsconfig.base.json

# Encoding
sonar.sourceEncoding=UTF-8

# Security hotspots — flag these patterns for review
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/.env.example
